<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3b82f6">
    <meta name="description" content="AI-powered chatbot for immigration visa guidance">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 192 192%27><rect fill=%27%233b82f6%27 width=%27192%27 height=%27192%27/><text x=%2750%25%27 y=%2750%25%27 font-size=%27120%27 font-weight=%27bold%27 fill=%27white%27 text-anchor=%27middle%27 dominant-baseline=%27central%27>ℹ</text></svg>">
    <title>Immigration Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #0a0e27; 
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }
        #root { 
            display: flex; 
            height: 100vh; 
            flex-direction: column;
        }
        .chat-container { 
            flex: 1; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
        }
        .messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg { 
            padding: 12px 16px; 
            border-radius: 8px; 
            max-width: 80%;
            word-wrap: break-word;
            animation: slideIn 0.3s ease-in;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg.user { 
            background: #1e3a5f; 
            align-self: flex-end;
            margin-left: auto;
        }
        .msg.assistant { 
            background: #2d3748; 
            align-self: flex-start;
            margin-right: auto;
        }
        .input-area { 
            padding: 20px; 
            border-top: 1px solid #444; 
            display: flex; 
            gap: 10px;
            background: #0a0e27;
        }
        input { 
            flex: 1; 
            padding: 12px; 
            background: #1a202c; 
            border: 1px solid #444; 
            color: #e0e0e0; 
            border-radius: 4px;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }
        button { 
            padding: 12px 24px; 
            background: #3b82f6; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }
        button:hover:not(:disabled) { 
            background: #2563eb; 
        }
        button:disabled {
            background: #1e40af;
            cursor: not-allowed;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js"></script>
    
    <script type="text/babel">
        function ChatApp() {
            const [messages, setMessages] = React.useState([
                { role: 'assistant', content: 'Welcome! Ask me anything about immigration visas (H1B, L1, Green Cards, LCA, etc.)' }
            ]);
            const [input, setInput] = React.useState('');
            const [loading, setLoading] = React.useState(false);
            const [sessionId] = React.useState('session-' + Date.now());
            const messagesEndRef = React.useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            };

            React.useEffect(() => {
                scrollToBottom();
            }, [messages]);

            const sendMessage = async (e) => {
                e.preventDefault();
                if (!input.trim() || loading) return;

                const userMessage = input.trim();
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: userMessage }]);
                setLoading(true);

                try {
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            session_id: sessionId, 
                            message: userMessage 
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();
                    setMessages(prev => [...prev, { 
                        role: 'assistant', 
                        content: data.reply || 'No response received'
                    }]);
                } catch (err) {
                    console.error('Chat error:', err);
                    setMessages(prev => [...prev, { 
                        role: 'assistant', 
                        content: `Error: ${err.message}. Please try again.`
                    }]);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="chat-container">
                    <div className="messages">
                        {messages.map((msg, i) => (
                            <div key={i} className={`msg ${msg.role}`}>
                                {msg.content}
                            </div>
                        ))}
                        {loading && (
                            <div className="msg assistant">
                                Thinking...
                            </div>
                        )}
                        <div ref={messagesEndRef} />
                    </div>
                    <form className="input-area" onSubmit={sendMessage}>
                        <input 
                            value={input} 
                            onChange={e => setInput(e.target.value)}
                            placeholder="Ask about immigration visas..."
                            disabled={loading}
                            autoFocus
                        />
                        <button type="submit" disabled={loading}>
                            {loading ? 'Sending...' : 'Send'}
                        </button>
                    </form>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ChatApp />);
    </script>
    <script>
      // Register service worker for PWA
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").then(
            (reg) => console.log("[PWA] Service Worker registered"),
            (err) => console.log("[PWA] Service Worker registration failed:", err)
          );
        });
      }
      // Handle install prompt
      let deferredPrompt;
      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        console.log("[PWA] Install prompt available");
      });
    </script>
</body>
</html>
