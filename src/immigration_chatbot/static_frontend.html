<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immigration Chatbot</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-markdown@9.0.1/index.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0e27; color: #e0e0e0; }
        #root { display: flex; height: 100vh; }
        .chat-container { flex: 1; display: flex; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { margin: 10px 0; padding: 12px; border-radius: 8px; }
        .msg.user { background: #1e3a5f; margin-left: 40px; }
        .msg.assistant { background: #2d3748; margin-right: 40px; }
        .input-area { padding: 20px; border-top: 1px solid #444; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; background: #1a202c; border: 1px solid #444; color: #e0e0e0; border-radius: 4px; }
        button { padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        function ChatApp() {
            const [messages, setMessages] = React.useState([]);
            const [input, setInput] = React.useState('');
            const [loading, setLoading] = React.useState(false);
            const [sessionId] = React.useState('session-' + Date.now());

            const sendMessage = async (e) => {
                e.preventDefault();
                if (!input.trim() || loading) return;

                const userMsg = { role: 'user', content: input };
                setMessages([...messages, userMsg]);
                setInput('');
                setLoading(true);

                try {
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ session_id: sessionId, message: input })
                    });
                    const data = await response.json();
                    setMessages(m => [...m, { role: 'assistant', content: data.reply }]);
                } catch (err) {
                    setMessages(m => [...m, { role: 'assistant', content: 'Error: ' + err.message }]);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="chat-container">
                    <div className="messages">
                        {messages.map((msg, i) => (
                            <div key={i} className={`msg ${msg.role}`}>{msg.content}</div>
                        ))}
                    </div>
                    <form className="input-area" onSubmit={sendMessage}>
                        <input 
                            value={input} 
                            onChange={e => setInput(e.target.value)}
                            placeholder="Ask about immigration visas..."
                            disabled={loading}
                        />
                        <button type="submit" disabled={loading}>{loading ? 'Loading...' : 'Send'}</button>
                    </form>
                </div>
            );
        }

        ReactDOM.render(<ChatApp />, document.getElementById('root'));
    </script>
</body>
</html>
